<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUSTBOY NEXUS - Live 3D Environmental Dashboard</title>
    <!-- Dependencies: Three.js for 3D, Chart.js for graphs, Paho MQTT for websockets -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --dark-bg: #030712;
            --neon-blue: #0ea5e9;
            --neon-green: #10b981;
            --neon-orange: #f59e0b;
            --neon-red: #ef4444;
            --panel-bg: rgba(15, 23, 42, 0.6);
            --panel-border: rgba(14, 165, 233, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Rajdhani', sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Glassmorphism Sci-Fi HUD overlay */
        .hud-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            /* Let clicks pass through to 3D canvas */
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            grid-template-rows: 80px 1fr 100px;
            padding: 20px;
            gap: 20px;
        }

        /* General Panel Styles */
        .panel {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--panel-border);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(14, 165, 233, 0.1);
            pointer-events: auto;
            /* Re-enable clicks inside panels */
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--neon-blue);
            padding-bottom: 10px;
            background: linear-gradient(90deg, rgba(14, 165, 233, 0.2) 0%, transparent 100%);
        }

        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(14, 165, 233, 0.8);
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--neon-red);
            box-shadow: 0 0 10px var(--neon-red);
        }

        /* Left Side: Real-time Stats feed */
        .left-panel {
            grid-column: 1;
            grid-row: 2;
        }

        .stats-title {
            font-family: 'Orbitron';
            color: var(--neon-blue);
            font-size: 1.2rem;
            margin-bottom: 15px;
            border-bottom: 1px dashed var(--panel-border);
            padding-bottom: 5px;
        }

        .feed-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .feed-container::-webkit-scrollbar {
            width: 4px;
        }

        .feed-container::-webkit-scrollbar-thumb {
            background: var(--neon-blue);
        }

        .data-card {
            background: rgba(0, 0, 0, 0.5);
            border-left: 3px solid var(--neon-blue);
            padding: 10px;
            font-size: 0.9rem;
            animation: fadeIn 0.3s ease-out forwards;
        }

        .data-card .mac {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-bottom: 5px;
        }

        .data-card .metrics {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
        }

        .data-card .val-pm {
            font-size: 1.2rem;
        }

        /* Right Side: Charts */
        .right-panel {
            grid-column: 3;
            grid-row: 2;
        }

        .chart-container {
            flex: 1;
            position: relative;
            margin-top: 10px;
        }

        /* Bottom Center: Global Avg */
        .bottom-panel {
            grid-column: 2;
            grid-row: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }

        .metric-big {
            text-align: center;
        }

        .metric-big .label {
            font-size: 1rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .metric-big .value {
            font-family: 'Orbitron';
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(-10px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Air Quality Colors */
        .aqi-good {
            color: var(--neon-green);
            border-color: var(--neon-green);
            text-shadow: 0 0 8px var(--neon-green);
        }

        .aqi-mod {
            color: var(--neon-orange);
            border-color: var(--neon-orange);
            text-shadow: 0 0 8px var(--neon-orange);
        }

        .aqi-bad {
            color: var(--neon-red);
            border-color: var(--neon-red);
            text-shadow: 0 0 8px var(--neon-red);
        }
    </style>
</head>

<body>

    <!-- 3D Environment -->
    <div id="canvas-container"></div>

    <!-- UI Overlay -->
    <div class="hud-container">
        <!-- Header -->
        <header class="header panel">
            <div class="title">NEXUS // DUSTBOY LIVE OVSERVATORY</div>
            <div class="status-indicator">
                <span id="conn-text">DISCONNECTED</span>
                <div class="status-dot" id="conn-dot"></div>
            </div>
        </header>

        <!-- Left feed -->
        <aside class="left-panel panel">
            <div class="stats-title">&gt; LIVE SENSOR STREAM</div>
            <div class="feed-container" id="feed">
                <!-- Cards injected here -->
            </div>
        </aside>

        <!-- Right charts -->
        <aside class="right-panel panel">
            <div class="stats-title">&gt; NETWORK ACTIVITY</div>
            <div class="chart-container">
                <canvas id="pulseChart"></canvas>
            </div>
        </aside>

        <!-- Bottom Avg -->
        <div class="bottom-panel panel" style="flex-direction: row;">
            <div class="metric-big">
                <div class="label">AVG PM2.5</div>
                <div class="value" id="g-pm25">--</div>
            </div>
            <div class="metric-big">
                <div class="label">NODES ACTIVE</div>
                <div class="value" id="g-nodes">0</div>
            </div>
        </div>
    </div>

    <!-- Logic Setup -->
    <script>
        // ==========================================
        // 1. DATA MANAGEMENT & GLOBALS
        // ==========================================
        const nodesData = new Map(); // Store latest data per MAC
        let totalPm25 = 0;
        let updateCounter = 0;

        // Colors
        const C_GOOD = '#10b981';
        const C_MOD = '#f59e0b';
        const C_BAD = '#ef4444';

        function getAqiColor(pm25) {
            if (pm25 <= 25) return C_GOOD;
            if (pm25 <= 50) return C_MOD;
            return C_BAD;
        }

        function getAqiClass(pm25) {
            if (pm25 <= 25) return 'aqi-good';
            if (pm25 <= 50) return 'aqi-mod';
            return 'aqi-bad';
        }

        // ==========================================
        // 2. THREE.JS 3D VISUALIZATION (Sci-Fi Data Core)
        // ==========================================
        let scene, camera, renderer, coreGroup, particles;
        const spheres = new Map(); // visual representation of nodes

        function init3D() {
            const container = document.getElementById('canvas-container');

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x030712, 0.002);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.set(0, 50, 200);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            coreGroup = new THREE.Group();
            scene.add(coreGroup);

            // Center Energy Core
            const coreGeo = new THREE.IcosahedronGeometry(20, 2);
            const coreMat = new THREE.MeshBasicMaterial({
                color: 0x0ea5e9,
                wireframe: true,
                transparent: true,
                opacity: 0.3
            });
            const coreMesh = new THREE.Mesh(coreGeo, coreMat);
            coreGroup.add(coreMesh);

            // Ambient background particles
            const pGeo = new THREE.BufferGeometry();
            const pCount = 2000;
            const posArray = new Float32Array(pCount * 3);
            for (let i = 0; i < pCount * 3; i++) {
                posArray[i] = (Math.random() - 0.5) * 500;
            }
            pGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
            const pMat = new THREE.PointsMaterial({
                size: 1.5,
                color: 0x0ea5e9,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending
            });
            particles = new THREE.Points(pGeo, pMat);
            scene.add(particles);

            // Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.2);
            scene.add(ambient);
            const pointL = new THREE.PointLight(0x0ea5e9, 2, 300);
            pointL.position.set(0, 0, 0);
            scene.add(pointL);

            window.addEventListener('resize', onWindowResize);
            animate3D();
        }

        function addOrUpdateNode3D(mac, pm25) {
            let mesh = spheres.get(mac);
            const colorObj = new THREE.Color(getAqiColor(pm25));

            if (!mesh) {
                // Spawn new 3D representation for sensor
                const geo = new THREE.SphereGeometry(3, 16, 16);
                const mat = new THREE.MeshBasicMaterial({
                    color: colorObj,
                    transparent: true,
                    opacity: 0.8
                });
                mesh = new THREE.Mesh(geo, mat);

                // Random position in a spherical orbit
                const radius = 60 + Math.random() * 80;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);

                mesh.position.x = radius * Math.sin(phi) * Math.cos(theta);
                mesh.position.y = radius * Math.sin(phi) * Math.sin(theta);
                mesh.position.z = radius * Math.cos(phi);

                // Link line to core
                const lineGeo = new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, 0, 0), mesh.position]);
                const lineMat = new THREE.LineBasicMaterial({ color: colorObj, transparent: true, opacity: 0.2 });
                const line = new THREE.Line(lineGeo, lineMat);

                const group = new THREE.Group();
                group.add(mesh);
                group.add(line);

                coreGroup.add(group);
                spheres.set(mac, { group: group, mesh: mesh, line: line, mat: mat, lineMat: lineMat });
            } else {
                // Update existing
                mesh.mesh.material.color = colorObj;
                mesh.line.material.color = colorObj;
                // Animate pop effect
                mesh.mesh.scale.set(1.5, 1.5, 1.5);
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate3D() {
            requestAnimationFrame(animate3D);

            // Rotate core
            coreGroup.rotation.y += 0.002;
            coreGroup.rotation.x += 0.001;

            // Rotate ambient particles
            particles.rotation.y -= 0.001;

            // Shrink node meshes back to normal after pop
            spheres.forEach(obj => {
                if (obj.mesh.scale.x > 1) {
                    obj.mesh.scale.lerp(new THREE.Vector3(1, 1, 1), 0.1);
                }
            });

            renderer.render(scene, camera);
        }

        // ==========================================
        // 3. CHART.JS SETUP
        // ==========================================
        let activityChart;
        const chartData = {
            labels: [],
            datasets: [{
                label: 'Updates / Sec',
                data: [],
                borderColor: '#0ea5e9',
                backgroundColor: 'rgba(14, 165, 233, 0.2)',
                borderWidth: 2,
                fill: true,
                tension: 0.4,
                pointRadius: 0
            }]
        };

        function initChart() {
            const ctx = document.getElementById('pulseChart').getContext('2d');
            activityChart = new Chart(ctx, {
                type: 'line',
                data: chartData,
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: {
                            display: true,
                            grid: { color: 'rgba(14, 165, 233, 0.1)' },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });

            // Update chart every second
            setInterval(() => {
                const now = new Date().toLocaleTimeString();
                chartData.labels.push(now);
                chartData.datasets[0].data.push(updateCounter);

                if (chartData.labels.length > 20) {
                    chartData.labels.shift();
                    chartData.datasets[0].data.shift();
                }

                activityChart.update();
                updateCounter = 0; // reset for next second
            }, 1000);
        }

        // ==========================================
        // 4. MQTT WEBSOCKET CONNECTION
        // ==========================================
        function initMQTT() {
            const host = "dustboy-wss-bridge.laris.workers.dev";
            const port = 443;
            const clientId = "vis3d_" + Math.random().toString(16).substr(2, 8);

            const client = new Paho.MQTT.Client(host, port, "/mqtt", clientId);

            client.onConnectionLost = (resp) => {
                document.getElementById("conn-text").innerText = "DISCONNECTED";
                document.getElementById("conn-text").style.color = "var(--neon-red)";
                document.getElementById("conn-dot").style.backgroundColor = "var(--neon-red)";
                document.getElementById("conn-dot").style.boxShadow = "0 0 10px var(--neon-red)";

                // Try reconnect in 5s
                setTimeout(() => client.connect(options), 5000);
            };

            client.onMessageArrived = (message) => {
                updateCounter++;
                try {
                    const payload = JSON.parse(message.payloadString);
                    // Extract data (handling different possible DustBoy formats)
                    // Common fields: pm25, pm10, temp, humid
                    let pm25 = payload.pm25 || payload.PM25;
                    let mac = payload.mac || message.destinationName.split('/')[2] || "UNKNOWN";

                    if (pm25 !== undefined) {
                        pm25 = parseFloat(pm25);
                        processData(mac, pm25, payload);
                    }
                } catch (e) {
                    // Ignore non-json or malformed
                }
            };

            const options = {
                useSSL: true,
                onSuccess: () => {
                    document.getElementById("conn-text").innerText = "STREAM ACTIVE";
                    document.getElementById("conn-text").style.color = "var(--neon-green)";
                    document.getElementById("conn-dot").style.backgroundColor = "var(--neon-green)";
                    document.getElementById("conn-dot").style.boxShadow = "0 0 10px var(--neon-green)";
                    client.subscribe("DUSTBOY/+/+/+/status");
                },
                onFailure: (e) => {
                    setTimeout(() => client.connect(options), 5000);
                }
            };

            client.connect(options);
        }

        // ==========================================
        // 5. DATA PROCESSING & DOM UPDATES
        // ==========================================
        function processData(mac, pm25, fullData) {
            // Update mapping
            nodesData.set(mac, pm25);

            // Global aggregates
            const numNodes = nodesData.size;
            let sum = 0;
            nodesData.forEach(v => sum += v);
            const avg = (sum / numNodes).toFixed(1);

            document.getElementById('g-nodes').innerText = numNodes;
            document.getElementById('g-pm25').innerText = avg;
            document.getElementById('g-pm25').className = 'value ' + getAqiClass(avg);

            // Update UI Feed
            const feed = document.getElementById('feed');
            const card = document.createElement('div');
            card.className = 'data-card';
            card.style.borderColor = getAqiColor(pm25);

            const time = new Date().toLocaleTimeString();
            card.innerHTML = `
                <div class="mac">${mac} // ${time}</div>
                <div class="metrics">
                    <span>PM2.5:</span>
                    <span class="val-pm ${getAqiClass(pm25)}">${pm25} µg/m³</span>
                </div>
            `;

            feed.insertBefore(card, feed.firstChild);
            if (feed.children.length > 30) {
                feed.removeChild(feed.lastChild);
            }

            // Trigger 3D update
            addOrUpdateNode3D(mac, pm25);
        }

        // ==========================================
        // STARTUP
        // ==========================================
        window.onload = () => {
            init3D();
            initChart();
            initMQTT();
        };

    </script>
</body>

</html>
