<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORACLE SPACE RACE | Multiplayer MQTT Game</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&family=Orbitron:wght@500;700;900&display=swap"
        rel="stylesheet">
    <!-- Paho MQTT Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>

    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: rgba(22, 27, 34, 0.8);
            --border-color: #30363d;
            --text-main: #e6edf3;
            --text-muted: #8b949e;

            --orange: #f59e0b;
            --neon-blue: #38bdf8;
            --neon-green: #10b981;
            --danger: #f43f5e;

            --glass-blur: blur(10px);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            /* Prevent selection while mashing */
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;

            background-image:
                radial-gradient(circle at 50% 10%, rgba(56, 189, 248, 0.1), transparent 40%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
        }

        header {
            text-align: center;
            padding: 30px 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: var(--glass-blur);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--orange), var(--neon-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        /* Server / Connection Status */
        .status-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 40px;
            background: #010409;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.8rem;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
            margin-right: 8px;
            box-shadow: 0 0 8px var(--danger);
        }

        /* Main Container */
        .container {
            display: grid;
            grid-template-columns: 350px 1fr;
            flex-grow: 1;
        }

        /* Left Panel - Lobby & Leaderboard */
        .sidebar {
            background: var(--panel-bg);
            border-right: 1px solid var(--border-color);
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 30px;
            backdrop-filter: var(--glass-blur);
        }

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--orange);
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(245, 158, 11, 0.3);
            padding-bottom: 10px;
        }

        /* Lobby Form */
        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--neon-blue);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: var(--neon-blue);
            color: #0d1117;
            border: none;
            border-radius: 6px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover:not(:disabled) {
            background: #7dd3fc;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.5);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #30363d;
            color: #8b949e;
            cursor: not-allowed;
        }

        /* Hall of Fame */
        .hof-list {
            list-style: none;
        }

        .hof-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 10px;
            border-bottom: 1px dashed var(--border-color);
            font-size: 0.9rem;
        }

        .hof-item:nth-child(1) {
            color: #facc15;
            font-weight: 700;
            font-size: 1rem;
        }

        .hof-item:nth-child(2) {
            color: #94a3b8;
        }

        .hof-item:nth-child(3) {
            color: #b45309;
        }

        .hof-rank {
            margin-right: 15px;
            opacity: 0.7;
        }

        .hof-name {
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .hof-time {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .ms {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        /* Right Panel - Race Track */
        .arena {
            padding: 40px;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .track-container {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px 40px;
            position: relative;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        /* Start/Finish Lines */
        .line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 4px;
            z-index: 10;
        }

        .line.start {
            left: 40px;
            background: repeating-linear-gradient(0deg,
                    #10b981,
                    #10b981 10px,
                    #000 10px,
                    #000 20px);
        }

        .line.finish {
            right: 40px;
            background: repeating-linear-gradient(0deg,
                    #fff,
                    #fff 10px,
                    #000 10px,
                    #000 20px);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        .finish-label {
            position: absolute;
            top: -25px;
            right: 25px;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        /* Player Lanes */
        .lane {
            position: relative;
            height: 60px;
            border-bottom: 2px dashed rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            width: 100%;
        }

        .runner {
            position: absolute;
            left: 0;
            /* 0 to 100% (-50px) */
            background: var(--neon-blue);
            width: 45px;
            height: 45px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
            transition: left 0.1s linear;
            z-index: 20;
        }

        .runner.is-me {
            background: var(--orange);
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.6);
            border: 2px solid #fff;
            z-index: 30;
        }

        .runner::after {
            content: attr(data-name);
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            white-space: nowrap;
            color: #c9d1d9;
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0, 0, 0, 0.8);
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Game UI Overlays */
        #game-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .huge-msg {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            font-weight: 900;
            color: #fff;
            text-align: center;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .instruction {
            color: var(--orange);
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .timer-display {
            font-size: 4rem;
            font-weight: 800;
            color: var(--neon-green);
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
            font-variant-numeric: tabular-nums;
            margin-bottom: 20px;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .pulse-text {
            animation: pulse 1s infinite alternate;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }

            .arena {
                padding: 20px;
                min-height: 500px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Oracle Space Race</h1>
        <div class="subtitle">Real-time MQTT Mashing Network</div>
    </header>

    <div class="status-bar">
        <div>
            <span id="conn-dot" class="status-dot"></span>
            <span id="conn-text" style="color: var(--danger);">DISCONNECTED</span>
        </div>
        <div style="color: var(--text-muted)">Broker: broker.hivemq.com (WSS)</div>
    </div>

    <div class="container">

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="lobby-panel">
                <h2 class="panel-title">1. ENTER ORACLE</h2>
                <div class="input-group">
                    <label>ORACLE DESIGNATION (NAME)</label>
                    <input type="text" id="p-name" placeholder="e.g. FastBot_99" maxlength="15">
                </div>
                <div class="input-group">
                    <label>CHOOSE AVATAR</label>
                    <select id="p-avatar"
                        style="width:100%; padding:12px; background:rgba(0,0,0,0.5); color:#fff; border:1px solid var(--border-color); border-radius:6px; font-size:1.5rem; outline:none;">
                        <option value="🚀" selected>🚀 Rocket</option>
                        <option value="🛸">🛸 UFO</option>
                        <option value="🏍️">🏍️ Tron Bike</option>
                        <option value="⚡">⚡ Bolt</option>
                        <option value="🐉">🐉 Dragon</option>
                    </select>
                </div>
                <button id="btn-login" class="btn" disabled>CONNECT TO GRID</button>
            </div>

            <div class="hof-panel">
                <h2 class="panel-title">🏆 HALL OF FAME</h2>
                <ul class="hof-list" id="hof-list">
                    <li class="hof-item" style="justify-content:center; color: var(--text-muted);">Fetching Retained
                        Records...</li>
                </ul>
                <div style="text-align: center; margin-top:15px; font-size: 0.7rem; color: #484f58;">
                    Powered by MQTT Retained Messages
                </div>
            </div>
        </div>

        <!-- Arena -->
        <div class="arena">
            <div class="track-container" id="track">
                <div class="line start"></div>
                <div class="line finish"></div>
                <div class="finish-label">FINISH</div>

                <!-- Game Overlays -->
                <div id="game-overlay">
                    <div class="huge-msg" id="overlay-msg">AWAITING PILOT</div>
                    <div class="instruction pulse-text" id="overlay-sub">Enter your Oracle name to connect</div>
                    <button id="btn-restart" class="btn btn-primary"
                        style="display:none; width:auto; margin-top: 20px;">RACE AGAIN</button>
                </div>

                <!-- Lanes get injected here -->
            </div>
        </div>

    </div>

    <script>
        /**
         * ORACLE SPACE RACE
         * A decentralized real-time game using MQTT entirely for backend state.
         * Concept: Spacebar mashing race.
         */

        // Configurations
        const CONFIG = {
            host: "broker.hivemq.com",
            port: 8884, // public secure WSS port
            baseTopic: "PITA_CV/ORACLE_RACE_001",
            maxProgress: 100, // Distance to finish line
            mashPower: 2.5,   // Distance gained per spacebar hit
            throttleMs: 150   // Prevent flooding network
        };

        const clientId = "Racer_" + Math.random().toString(16).substr(2, 8);
        let client;

        // Player State
        let me = {
            id: clientId,
            name: "",
            avatar: "🚀",
            progress: 0,
            isPlaying: false,
            hasFinished: false,
            startTime: 0,
            finalTime: 0
        };

        // Network State
        let opponents = new Map(); // id -> { name, avatar, progress }
        let hallOfFame = []; // Array of { name, time }
        let lastPublishTime = 0;

        // DOM Elements
        const DOM = {
            connDot: document.getElementById('conn-dot'),
            connText: document.getElementById('conn-text'),
            btnLog: document.getElementById('btn-login'),
            btnRes: document.getElementById('btn-restart'),
            inpName: document.getElementById('p-name'),
            selAvatar: document.getElementById('p-avatar'),
            hofList: document.getElementById('hof-list'),
            track: document.getElementById('track'),
            overlay: document.getElementById('game-overlay'),
            oMsg: document.getElementById('overlay-msg'),
            oSub: document.getElementById('overlay-sub')
        };

        // ==========================================
        // 1. MQTT SETUP & LOGIC
        // ==========================================
        function initMQTT() {
            client = new Paho.MQTT.Client(CONFIG.host, CONFIG.port, "/mqtt", clientId);

            client.onConnectionLost = (resp) => {
                setConnStatus("DISCONNECTED", "var(--danger)");
                setTimeout(initMQTT, 5000); // Reconnect
            };

            client.onMessageArrived = (msg) => {
                const topic = msg.destinationName;
                try {
                    const payload = JSON.parse(msg.payloadString);

                    if (topic === `${CONFIG.baseTopic}/HOF`) {
                        handleHOFUpdate(payload);
                    }
                    else if (topic.startsWith(`${CONFIG.baseTopic}/Player/`)) {
                        handleOpponentUpdate(payload, topic);
                    }
                } catch (e) { console.warn("Parse Error:", e); }
            };

            const options = {
                useSSL: true,
                onSuccess: () => {
                    setConnStatus("GRID CONNECTED", "var(--neon-green)");
                    DOM.btnLog.disabled = false;

                    // Subscribe to HallOfFame (retained message acts as database)
                    client.subscribe(`${CONFIG.baseTopic}/HOF`);
                    // Subscribe to all players movement
                    client.subscribe(`${CONFIG.baseTopic}/Player/+`);
                },
                onFailure: (e) => {
                    console.log("Connection failed: ", e);
                    setConnStatus("LINK FAILED", "var(--danger)");
                    setTimeout(initMQTT, 5000);
                }
            };

            setConnStatus("CONNECTING...", "var(--orange)");
            client.connect(options);
        }

        function setConnStatus(text, color) {
            DOM.connText.innerText = text;
            DOM.connText.style.color = color;
            DOM.connDot.style.background = color;
            DOM.connDot.style.boxShadow = `0 0 8px ${color}`;
        }

        function publishState(isFinal = false) {
            if (!client.isConnected()) return;

            const topic = `${CONFIG.baseTopic}/Player/${clientId}`;
            const payload = JSON.stringify({
                id: me.id,
                name: me.name,
                avatar: me.avatar,
                progress: me.progress,
                finalTime: me.finalTime,
                isFinal: isFinal
            });

            const msg = new Paho.MQTT.Message(payload);
            msg.destinationName = topic;
            msg.retained = false; // Player state isn't retained
            client.send(msg);
        }

        function publishHOF(newRecord) {
            // Add new record, sort, keep top 5
            hallOfFame.push(newRecord);
            hallOfFame.sort((a, b) => a.time - b.time);
            hallOfFame = hallOfFame.slice(0, 5); // Keep only top 5

            const topic = `${CONFIG.baseTopic}/HOF`;
            const payload = JSON.stringify(hallOfFame);
            const msg = new Paho.MQTT.Message(payload);
            msg.destinationName = topic;
            msg.retained = true; // THIS IS THE MAGIC - acts as a database
            client.send(msg);
        }

        // ==========================================
        // 2. GAME MECHANICS
        // ==========================================
        DOM.inpName.addEventListener('input', () => {
            DOM.btnLog.disabled = DOM.inpName.value.trim().length === 0 || !client.isConnected();
        });

        DOM.btnLog.addEventListener('click', () => {
            const name = DOM.inpName.value.trim();
            if (!name) return;

            me.name = name;
            me.avatar = DOM.selAvatar.value;

            // UI Change
            DOM.inpName.disabled = true;
            DOM.selAvatar.disabled = true;
            DOM.btnLog.style.display = 'none';

            prepareToRace();
        });

        DOM.btnRes.addEventListener('click', prepareToRace);

        function prepareToRace() {
            // Reset state
            me.progress = 0;
            me.hasFinished = false;
            me.finalTime = 0;
            me.isPlaying = false;

            publishState(); // Broadcast start pos

            // Countdown
            DOM.overlay.style.display = 'flex';
            DOM.btnRes.style.display = 'none';
            DOM.oSub.style.display = 'none';

            let count = 3;
            DOM.oMsg.innerText = count;
            DOM.oMsg.style.color = "var(--orange)";

            const iv = setInterval(() => {
                count--;
                if (count > 0) {
                    DOM.oMsg.innerText = count;
                } else {
                    clearInterval(iv);
                    startGame();
                }
            }, 1000);
        }

        function startGame() {
            DOM.oMsg.innerText = "MASH SPACEBAR!";
            DOM.oMsg.style.color = "var(--neon-green)";

            // Hide overlay after 0.5s
            setTimeout(() => {
                DOM.overlay.style.display = 'none';
            }, 500);

            me.isPlaying = true;
            me.startTime = performance.now();
        }

        // The Core Interaction
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && me.isPlaying && !me.hasFinished) {
                e.preventDefault(); // Prevent page scroll

                me.progress += CONFIG.mashPower;

                // Cap at max and Finish
                if (me.progress >= CONFIG.maxProgress) {
                    me.progress = CONFIG.maxProgress;
                    finishRace();
                }

                renderTrack();

                // Throttle network publish
                const now = Date.now();
                if (now - lastPublishTime > CONFIG.throttleMs || me.hasFinished) {
                    publishState(me.hasFinished);
                    lastPublishTime = now;
                }
            }
        });

        function finishRace() {
            me.hasFinished = true;
            me.isPlaying = false;
            me.finalTime = ((performance.now() - me.startTime) / 1000).toFixed(3);

            DOM.overlay.style.display = 'flex';
            DOM.oMsg.innerText = "FINISHED!";
            DOM.oMsg.style.color = "#fff";

            DOM.oSub.style.display = 'block';
            DOM.oSub.classList.remove('pulse-text');
            DOM.oSub.innerHTML = `YOUR TIME: <span class="timer-display" style="font-size:2rem;">${me.finalTime}</span> s`;

            DOM.btnRes.style.display = 'block';

            // Check HOF
            checkHoFQualification();
        }

        function checkHoFQualification() {
            const timeNum = parseFloat(me.finalTime);
            // Qualify if HOF is empty, not full, or faster than the slowest
            if (hallOfFame.length < 5 || timeNum < hallOfFame[hallOfFame.length - 1].time) {
                publishHOF({ name: me.name, time: timeNum });

                DOM.oMsg.innerText = "🏆 NEW RECORD 🏆";
                DOM.oMsg.style.color = "#facc15";
            }
        }

        // ==========================================
        // 3. RENDERING
        // ==========================================
        function handleOpponentUpdate(data, topic) {
            // Ignore self bounce-back
            if (data.id === clientId) return;

            // Remove if they report 0 (restarting), optional cleanup

            opponents.set(data.id, data);
            renderTrack();
        }

        function renderTrack() {
            // Collect everyone
            let runners = [{ ...me, isMe: true }];
            opponents.forEach(op => runners.push({ ...op, isMe: false }));

            // Clear extra lanes, keep start/finish lines & overlay
            // Quick hack: recreate lanes entirely
            const baseHTML = `
                <div class="line start"></div>
                <div class="line finish"></div>
                <div class="finish-label">FINISH</div>
                <div id="game-overlay" style="display: ${DOM.overlay.style.display}">
                    ${DOM.overlay.innerHTML}
                </div>
            `;

            let lanesHTML = "";
            runners.forEach(r => {
                // Math: 0% is left:40px, 100% is right:40px
                // To do this simply with left %, we calculate visual space.
                // Or just use calc: left: calc(40px + (100% - 120px) * (progress/100))
                const visualPos = `calc(40px + (100% - 125px) * (${r.progress} / 100))`;
                const meClass = r.isMe ? "is-me" : "";

                lanesHTML += `
                    <div class="lane">
                        <div class="runner ${meClass}" data-name="${r.name || 'Anon'}" style="left: ${visualPos};">
                            ${r.avatar}
                        </div>
                    </div>
                `;
            });

            DOM.track.innerHTML = baseHTML + lanesHTML;
            // Re-bind DOM overlay ref
            DOM.overlay = document.getElementById('game-overlay');
            DOM.oMsg = document.getElementById('overlay-msg');
            DOM.oSub = document.getElementById('overlay-sub');
            DOM.btnRes = document.getElementById('btn-restart');
            if (DOM.btnRes) DOM.btnRes.addEventListener('click', prepareToRace);
        }

        function handleHOFUpdate(records) {
            if (!Array.isArray(records)) return;
            hallOfFame = records;

            if (hallOfFame.length === 0) {
                DOM.hofList.innerHTML = `<li class="hof-item" style="justify-content:center; color: var(--text-muted);">No records yet. Be the first!</li>`;
                return;
            }

            let html = "";
            hallOfFame.forEach((r, idx) => {
                const medals = ["🥇", "🥈", "🥉", "4th", "5th"];
                html += `
                    <li class="hof-item">
                        <span class="hof-rank">${medals[idx] || (idx + 1)}</span>
                        <span class="hof-name">${r.name}</span>
                        <span><span class="hof-time">${r.time.toFixed(3)}</span><span class="ms">s</span></span>
                    </li>
                `;
            });
            DOM.hofList.innerHTML = html;
        }

        // Start connection
        initMQTT();

    </script>
</body>

</html>
